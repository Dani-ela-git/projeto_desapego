<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESAPEGO</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="home">
        <section class="grid-container">
            <header class="header">
                <div class="logo">
                    <a href="#" class="logo-link">
                        <img src="img/logosemfundo350px.png" alt="Logo do site" class="logo-image">
                    </a>
                </div>

                <nav class="navbar">
                    <button class="sobre">
                        <a href="about.html"> Sobre nós </a>
                    </button>
                    <button class="entrar">
                        <a href="#"> Entrar</a>
                    </button>
                    <button class="login">
                        <a href="#"> Login</a>
                    </button>
                </nav>
            </header>

            <div class="titulo">
                <h1>Doar faz parte!</h1>
                <a href="#">
                    <button class="btn-doar">Faça uma doação</button>
                </a>
                <a href="#">
                    <button class="btn-retirar">Retire uma doação</button>
                </a>
            </div>

            <div class="conteudo">
                <h2><span style="color: red;">DOAR</span> faz <span style="color: red;">PARTE</span>. Participe disso!!</h2>
                
            </div>

            <div class="alimentos">
                <img src="img/alimentoshome2.jpg" alt="imagem de tomates em cima de um prato de madeira"
                    class="alimentos-image">
                <a href="#">
                    <h2>Alimentos</h2>
                </a>
            </div>

            <div class="objetos">
                <img src="img/objetoshome2.jpg" alt="imagem de objetos em cima de uma mesa" class="objetos-image">
                <a href="#">
                    <h2>Objetos</h2>
                </a>
            </div>

            <div class="roupas">
                <img src="img/roupashome4.jpg" alt="imagem de roupas em um manequin" class="roupas-image">
                <a href="#">
                    <h2>Roupas e sapatos</h2>
                </a>
            </div>

            <footer class="footer">
                <p class="left-footer">&copy; 2026 DESAPEGO - Todos os direitos reservados 
                </p>
            </footer>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
